---
- name: Configurar servidor LDAP en compute-0-0
  hosts: servidor
  become: yes
  vars:
    ldap_role: "servidor"
  roles:
    - dgtrabada.ansible

- name: Configurar clientes LDAP en compute-0-1 y compute-0-2
  hosts: clientes
  become: yes
  vars:
    ldap_role: "cliente"
  roles:
    - dgtrabada.ansible
