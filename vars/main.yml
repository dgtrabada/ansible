---
# vars file for cluster-ldap-slurm
ldap_domain: "ldap.tunombre.local"
ldap_server_ip: "172.16.0.10"
ldap_org: "tunombre"
ldap_password: "alumno"
ldap_backend: "HDB"

ldap_env: "container"   # valores posibles: "vm" o "container"


# Derivado automáticamente
ldap_base_dn: "{{ 'dc=' + ldap_domain.split('.') | join(',dc=') }}"
ldap_uri: "ldap://{{ ldap_server_ip }}"
ldap_root_dn: "cn=admin,{{ ldap_base_dn }}"
